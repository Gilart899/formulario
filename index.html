<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GilArt Marketing | Planejamento de Campanhas</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Poppins',sans-serif;

background:linear-gradient(135deg,#003b8e,#0057d8,#1b7cff);

background-attachment:fixed;

padding:25px;

}

.container{

max-width:950px;

margin:auto;

background:#fff;

border-radius:20px;

overflow:hidden;

box-shadow:0 20px 60px rgba(0,0,0,.30);

}

.topo{

background:linear-gradient(90deg,#0046c0,#0b6fff);

padding:35px;

text-align:center;

color:#fff;

}

.topo img{

width:190px;

margin-bottom:15px;

filter:drop-shadow(0 5px 12px rgba(0,0,0,.35));

}

.topo h1{

font-size:33px;

margin-bottom:8px;

}

.topo p{

font-size:16px;

opacity:.95;

}

.aviso{

margin-top:18px;

background:#ffffff22;

padding:15px;

border-radius:12px;

font-size:15px;

}

.formulario{

padding:35px;

}

.bloco{

margin-bottom:35px;

padding-bottom:25px;

border-bottom:1px solid #ececec;

}

.bloco h2{

color:#0047b3;

margin-bottom:15px;

font-size:22px;

}

.grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(240px,1fr));

gap:12px;

margin-bottom:15px;

}

label{

display:block;

padding:8px 0;

cursor:pointer;

}

input[type=text],
textarea{

width:100%;

padding:14px;

border:1px solid #dcdcdc;

border-radius:10px;

font-size:15px;

margin-top:10px;

font-family:Poppins;

}

textarea{

min-height:90px;

resize:vertical;

}

input[type=checkbox],
input[type=radio]{

transform:scale(1.15);

margin-right:8px;

}

.botao{

width:100%;

padding:18px;

font-size:19px;

font-weight:bold;

background:#25D366;

border:none;

border-radius:12px;

cursor:pointer;

color:white;

transition:.3s;

}

.botao:hover{

background:#1eb858;

transform:scale(1.02);

}

.rodape{

background:#f4f6fb;

padding:25px;

text-align:center;

color:#666;

font-size:14px;

}

@media(max-width:700px){

.topo h1{

font-size:27px;

}

}

</style>

</head>

<body>

<div class="container">

<div class="topo">

<img src="logo.png">

<h1>GilArt Marketing</h1>

<p>Planejamento Inteligente para Google Ads, Meta Ads e Estratégias Digitais.</p>

<div class="aviso">

Preencha este formulário. Assim que finalizar, clique no botão e todas as respostas serão enviadas automaticamente para nosso WhatsApp.

</div>

</div>

<div class="formulario">

<div class="bloco">

<h2>1️⃣ Objetivo da Campanha</h2>

<div class="grid">

<label><input type="checkbox" name="objetivo" value="Vender Produtos">Vender Produtos</label>

<label><input type="checkbox" name="objetivo" value="Novos Clientes">Novos Clientes</label>

<label><input type="checkbox" name="objetivo" value="WhatsApp">Receber mensagens</label>

<label><input type="checkbox" name="objetivo" value="Ligações">Receber ligações</label>

<label><input type="checkbox" name="objetivo" value="Site">Levar pessoas ao site</label>

<label><input type="checkbox" name="objetivo" value="Marca">Divulgar a marca</label>

</div>

<input type="text" id="outroObjetivo" placeholder="Outro objetivo">

</div>

<div class="bloco">

<h2>2️⃣ O que deseja anunciar?</h2>

<div class="grid">

<label><input type="checkbox" name="tipo" value="Produto">Produto</label>

<label><input type="checkbox" name="tipo" value="Serviço">Serviço</label>

<label><input type="checkbox" name="tipo" value="Promoção">Promoção</label>

<label><input type="checkbox" name="tipo" value="Lançamento">Lançamento</label>

<label><input type="checkbox" name="tipo" value="Vários Produtos">Vários Produtos</label>

</div>

<textarea id="descricao" placeholder="Explique rapidamente o que deseja anunciar"></textarea>

</div>

  <script>

function pegarValores(nome){

let lista=[];

document.querySelectorAll('input[name="'+nome+'"]:checked').forEach(item=>{

lista.push(item.value);

});

return lista.join(", ");

}

function enviarWhatsApp(){

if(!confirm("Deseja enviar este planejamento para a GilArt Marketing?")){

return;

}

let sexo=document.querySelector('input[name="sexo"]:checked');

let mensagem="";

mensagem+="*📋 NOVO PLANEJAMENTO DE CAMPANHA*%0A%0A";

mensagem+="*🎯 Objetivo:* "+pegarValores("objetivo")+" "+document.getElementById("outroObjetivo").value+"%0A%0A";

mensagem+="*📢 Tipo de anúncio:* "+pegarValores("tipo")+"%0A";

mensagem+="*📝 Descrição:* "+document.getElementById("descricao").value+"%0A%0A";

mensagem+="*👥 Sexo:* "+(sexo?sexo.value:"Não informado")+"%0A";

mensagem+="*🎂 Idade:* "+document.getElementById("idade").value+"%0A%0A";

mensagem+="*📍 Região:* "+pegarValores("regiao")+" "+document.getElementById("outraRegiao").value+"%0A%0A";

mensagem+="*☎ Contato:* "+document.getElementById("contato").value+"%0A%0A";

mensagem+="*📂 Material:* "+pegarValores("material")+"%0A%0A";

mensagem+="*⭐ Diferencial:* "+pegarValores("diferencial")+" "+document.getElementById("outroDif").value+"%0A%0A";

mensagem+="*💰 Orçamento:* "+document.getElementById("orcamento").value+"%0A";

mensagem+="*📅 Tempo:* "+document.getElementById("tempo").value+"%0A%0A";

mensagem+="*🏢 Empresa:* "+document.getElementById("empresa").value+"%0A";

mensagem+="*📍 Cidade:* "+document.getElementById("cidade").value+"%0A";

mensagem+="*📱 Instagram:* "+document.getElementById("instagram").value+"%0A";

mensagem+="*🌐 Site:* "+document.getElementById("site").value+"%0A%0A";

mensagem+="Enviado pelo formulário da *GilArt Marketing*.";

let numero="5579999145044";

window.open("https://wa.me/"+numero+"?text="+encodeURIComponent(mensagem),"_blank");

}

</script>
